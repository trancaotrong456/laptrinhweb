<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng kí</title>
    <link rel="stylesheet" href="public/css/style.css">
</head>

<body>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="login.html">Đăng nhập</a></li>
            <li><a href="register.html">Đăng kí</a></li>
        </ul>
    </nav>

    <form action="">
        <h1>Màn hình đăng kí</h1>

        <label for="username">Tên đăng nhập:</label>
        <input type="text" id="username" name="username" required>

        <label for="password">Mật khẩu:</label>
        <input type="password" id="password" name="password" required>

        <label for="confirm_password">Nhập lại mật khẩu:</label>
        <input type="password" id="confirm_password" name="confirm_password" required>

        <label for="email">Email:</label>
        <input type="text" id="email" name="email" required>

        <div class="form-actions">
            <input type="submit" value="Đăng kí">
            <span class="login-link">Đã có tài khoản? <a href="login.html">Đăng nhập</a></span>
        </div>
    </form>

    <footer style="background-color: blue; color: white; padding: 10px; position: fixed; bottom: 0; width: 100%;">
        <p style="text-align: center; margin: 0;">&copy; Trần Cao Trọng-24211TT1101</p>
    </footer>
</body>

</html>
